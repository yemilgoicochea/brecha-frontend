<header *ngIf="isAuthenticated" class="sticky top-0 z-50 bg-gray-900 border-b border-gray-800 shadow-lg">
  <nav class="mx-auto max-w-7xl px-4 py-4 flex items-center justify-between">
    <!-- Logo/Brand -->
    <div class="flex items-center gap-2">
      <a routerLink="/dashboard" class="text-xl font-bold text-white hover:text-indigo-400 transition-colors">
        <span class="bg-gradient-to-r from-indigo-500 to-indigo-600 bg-clip-text text-transparent">Brecha</span>
      </a>
    </div>

    <!-- Desktop Navigation -->
    <div class="hidden md:flex items-center gap-8">
      <a routerLink="/dashboard" 
         routerLinkActive="text-indigo-400 font-semibold" 
         [routerLinkActiveOptions]="{ exact: true }"
         class="text-sm text-gray-300 hover:text-white transition-colors">
        Dashboard
      </a>
      <a routerLink="/classify" 
         routerLinkActive="text-indigo-400 font-semibold"
         class="text-sm text-gray-300 hover:text-white transition-colors">
        Clasificador
      </a>
      <a routerLink="/history" 
         routerLinkActive="text-indigo-400 font-semibold"
         class="text-sm text-gray-300 hover:text-white transition-colors">
        Historial
      </a>
    </div>

    <!-- User Menu -->
    <div class="hidden md:flex items-center gap-4">
      <div class="flex items-center gap-2 text-sm">
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-indigo-600 flex items-center justify-center text-white font-semibold">
          {{ (currentUser?.name?.charAt(0) || 'U').toUpperCase() }}
        </div>
        <span class="text-gray-300">{{ currentUser?.name }}</span>
      </div>
      <button (click)="logout()" 
              class="px-4 py-2 text-sm text-gray-300 hover:text-white bg-gray-800 hover:bg-gray-700 rounded transition-colors">
        Salir
      </button>
    </div>

    <!-- Mobile Menu Button -->
    <button (click)="toggleMobileMenu()" class="md:hidden text-gray-300 hover:text-white">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
      </svg>
    </button>
  </nav>

  <!-- Mobile Navigation -->
  <div *ngIf="mobileMenuOpen" class="md:hidden bg-gray-800 border-t border-gray-700">
    <div class="px-4 py-3 space-y-2">
      <a routerLink="/dashboard" 
         (click)="closeMobileMenu()"
         routerLinkActive="bg-indigo-600"
         class="block px-3 py-2 text-sm text-gray-300 hover:text-white hover:bg-gray-700 rounded transition-colors">
        Dashboard
      </a>
      <a routerLink="/classify" 
         (click)="closeMobileMenu()"
         routerLinkActive="bg-indigo-600"
         class="block px-3 py-2 text-sm text-gray-300 hover:text-white hover:bg-gray-700 rounded transition-colors">
        Clasificador
      </a>
      <a routerLink="/history" 
         (click)="closeMobileMenu()"
         routerLinkActive="bg-indigo-600"
         class="block px-3 py-2 text-sm text-gray-300 hover:text-white hover:bg-gray-700 rounded transition-colors">
        Historial
      </a>
      <button (click)="logout(); closeMobileMenu()" 
              class="w-full text-left px-3 py-2 text-sm text-gray-300 hover:text-white hover:bg-gray-700 rounded transition-colors">
        Salir
      </button>
    </div>
  </div>
</header>

<main class="bg-gray-900 min-h-screen">
  <router-outlet></router-outlet>
</main>
