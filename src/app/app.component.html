<header *ngIf="isAuthenticated" class="sticky top-0 z-50 bg-gray-900 border-b border-gray-800 shadow-lg">
  <nav class="mx-auto max-w-7xl px-4 py-4 flex items-center justify-between">
    <!-- Logo/Brand -->
    <div class="flex items-center gap-2">
      <a routerLink="/dashboard" class="text-xl font-bold text-white hover:text-indigo-400 transition-colors">
        <span class="bg-gradient-to-r from-indigo-500 to-indigo-600 bg-clip-text text-transparent">Brecha</span>
      </a>
    </div>

    <!-- Desktop Navigation -->
    <div class="hidden md:flex items-center gap-8">
      <a routerLink="/dashboard"
         routerLinkActive="text-indigo-400 font-semibold"
         [routerLinkActiveOptions]="{ exact: true }"
         class="text-sm text-gray-300 hover:text-white transition-colors">
        Dashboard
      </a>
      <a routerLink="/classify"
         routerLinkActive="text-indigo-400 font-semibold"
         class="text-sm text-gray-300 hover:text-white transition-colors">
        Clasificador
      </a>
      <a routerLink="/history"
         routerLinkActive="text-indigo-400 font-semibold"
         class="text-sm text-gray-300 hover:text-white transition-colors">
        Historial
      </a>
      <!-- Admin links -->
      <ng-container *ngIf="isAdmin">
        <span class="w-px h-4 bg-gray-700"></span>
        <a routerLink="/admin/sectors"
           routerLinkActive="text-amber-400 font-semibold"
           class="text-sm text-gray-300 hover:text-amber-400 transition-colors flex items-center gap-1">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-3.5 h-3.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          Admin
        </a>
      </ng-container>
    </div>

    <!-- User Menu -->
    <div class="hidden md:flex items-center gap-4">
      <div class="flex items-center gap-2 text-sm">
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-indigo-600 flex items-center justify-center text-white font-semibold">
          {{ (currentUser?.name?.charAt(0) || 'U').toUpperCase() }}
        </div>
        <span class="text-gray-300">{{ currentUser?.name }}</span>
      </div>
      <button (click)="logout()" 
              class="px-4 py-2 text-sm text-gray-300 hover:text-white bg-gray-800 hover:bg-gray-700 rounded transition-colors">
        Salir
      </button>
    </div>

    <!-- Mobile Menu Button -->
    <button (click)="toggleMobileMenu()" class="md:hidden text-gray-300 hover:text-white">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
      </svg>
    </button>
  </nav>

  <!-- Mobile Navigation -->
  <div *ngIf="mobileMenuOpen" class="md:hidden bg-gray-800 border-t border-gray-700">
    <div class="px-4 py-3 space-y-2">
      <a routerLink="/dashboard" 
         (click)="closeMobileMenu()"
         routerLinkActive="bg-indigo-600"
         class="block px-3 py-2 text-sm text-gray-300 hover:text-white hover:bg-gray-700 rounded transition-colors">
        Dashboard
      </a>
      <a routerLink="/classify" 
         (click)="closeMobileMenu()"
         routerLinkActive="bg-indigo-600"
         class="block px-3 py-2 text-sm text-gray-300 hover:text-white hover:bg-gray-700 rounded transition-colors">
        Clasificador
      </a>
      <a routerLink="/history" 
         (click)="closeMobileMenu()"
         routerLinkActive="bg-indigo-600"
         class="block px-3 py-2 text-sm text-gray-300 hover:text-white hover:bg-gray-700 rounded transition-colors">
        Historial
      </a>
      <ng-container *ngIf="isAdmin">
        <div class="border-t border-gray-700 my-1"></div>
        <a routerLink="/admin/sectors"
           (click)="closeMobileMenu()"
           routerLinkActive="bg-amber-900/30 text-amber-400"
           class="block px-3 py-2 text-sm text-gray-300 hover:text-amber-400 hover:bg-gray-700 rounded transition-colors">
          Admin — Sectores
        </a>
        <a routerLink="/admin/gaps"
           (click)="closeMobileMenu()"
           routerLinkActive="bg-amber-900/30 text-amber-400"
           class="block px-3 py-2 text-sm text-gray-300 hover:text-amber-400 hover:bg-gray-700 rounded transition-colors">
          Admin — Brechas
        </a>
      </ng-container>
      <button (click)="logout(); closeMobileMenu()"
              class="w-full text-left px-3 py-2 text-sm text-gray-300 hover:text-white hover:bg-gray-700 rounded transition-colors">
        Salir
      </button>
    </div>
  </div>
</header>

<main class="bg-gray-900 min-h-screen">
  <router-outlet></router-outlet>
</main>
